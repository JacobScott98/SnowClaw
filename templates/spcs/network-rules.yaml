# Network rules for SnowClaw SPCS service
# Allows outbound HTTPS to model providers and Slack API.

egress_rules:
  - name: openrouter_access
    type: HOST_PORT
    value_list:
      - openrouter.ai:443

  - name: slack_api_access
    type: HOST_PORT
    value_list:
      - api.slack.com:443
      - wss-primary.slack.com:443
      - wss-backup.slack.com:443
      - wss-primary.slack.com:8443
      - wss-backup.slack.com:8443

  - name: snowflake_cortex_access
    type: HOST_PORT
    value_list:
      - "*.snowflakecomputing.com:443"

spec:
  containers:
    - name: openclaw
      image: /snowclaw_db/snowclaw_schema/snowclaw_repo/snowclaw:latest
      secrets:
        - snowflakeSecret: snowclaw_db.snowclaw_schema.snowclaw_openrouter_key
          secretKeyRef: secret_string
          envVarName: OPENROUTER_API_KEY
        - snowflakeSecret: snowclaw_db.snowclaw_schema.snowclaw_sf_token
          secretKeyRef: secret_string
          envVarName: SNOWFLAKE_TOKEN
        - snowflakeSecret: snowclaw_db.snowclaw_schema.snowclaw_slack_bot_token
          secretKeyRef: secret_string
          envVarName: SLACK_BOT_TOKEN
        - snowflakeSecret: snowclaw_db.snowclaw_schema.snowclaw_slack_app_token
          secretKeyRef: secret_string
          envVarName: SLACK_APP_TOKEN
      resources:
        requests:
          cpu: 1
          memory: 2Gi
        limits:
          cpu: 2
          memory: 4Gi
      volumeMounts:
        - name: openclaw-state
          mountPath: /home/node/.openclaw
  endpoints:
    - name: snowclaw
      port: 18789
      public: true
  volumes:
    - name: openclaw-state
      source: "@snowclaw_state_stage"
      uid: 1000
      gid: 1000

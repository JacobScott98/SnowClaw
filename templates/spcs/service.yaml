spec:
  containers:
    - name: openclaw
      image: /snowclaw_db/snowclaw_schema/snowclaw_repo/snowclaw:latest
      env:
        OPENROUTER_API_KEY:
          type: secret
          name: snowclaw_secrets
          key: openrouter_api_key
        SNOWFLAKE_TOKEN:
          type: secret
          name: snowclaw_secrets
          key: snowflake_token
        SLACK_BOT_TOKEN:
          type: secret
          name: snowclaw_secrets
          key: slack_bot_token
        SLACK_APP_TOKEN:
          type: secret
          name: snowclaw_secrets
          key: slack_app_token
      resources:
        requests:
          cpu: 1
          memory: 2Gi
        limits:
          cpu: 2
          memory: 4Gi
      volumeMounts:
        - name: openclaw-state
          mountPath: /home/node/.openclaw
  endpoints:
    - name: snowclaw
      port: 18789
      public: true
  volumes:
    - name: openclaw-state
      source: "@snowclaw_state_stage"
      uid: 1000
      gid: 1000
